<!DOCTYPE html>
<html>
<head>
    <title>Test Page</title>
</head>
<body>
    <h1>Testing localhost:3007</h1>
    <iframe src="http://localhost:3007" width="100%" height="600px"></iframe>
    <script>
        // Log any errors from the iframe
        window.addEventListener('error', (e) => {
            console.error('Global error:', e);
        });

        window.addEventListener('message', (e) => {
            console.log('Message from iframe:', e);
        });
    </script>
</body>
</html>
